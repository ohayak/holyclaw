services:
  cliproxy:
    image: eceasy/cli-proxy-api-plus:latest
    pull_policy: always
    container_name: cliproxy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MANAGEMENT_PASSWORD=${CLIPROXY_PASSWORD}
    expose:
      - "8317"
      - "8085"
      - "51121"
      - "54545"
      - "1455"
      - "11451"
    volumes:
      - ./cli-proxy-config.yaml:/CLIProxyAPI/config.yaml
      - ./data/cli-proxy/auths:/CLIProxyAPI/auths
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cliproxy.rule=Host(`cliproxy.${DOMAIN}`)"
      - "traefik.http.routers.cliproxy.entrypoints=websecure"
      - "traefik.http.routers.cliproxy.tls=true"
      - "traefik.http.routers.cliproxy.tls.certresolver=letsencrypt"
      - "traefik.http.services.cliproxy.loadbalancer.server.port=8317"
    networks:
      - tools

  browser:
    build:
      context: .
      dockerfile: Dockerfile.browser
    container_name: browser
    restart: unless-stopped
    shm_size: "512m"
    env_file:
      - .env
    environment:
      - VNC_PW=${VNC_PASSWORD}
      - XDG_RUNTIME_DIR=/tmp/runtime-kasm-user
      - KASM_PORT=6901
    expose:
      - "9222"
      - "6901"
    volumes:
      - ./data/browser:/home/kasm-user
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.browser.rule=Host(`browser.${DOMAIN}`)"
      - "traefik.http.routers.browser.entrypoints=websecure"
      - "traefik.http.routers.browser.tls=true"
      - "traefik.http.routers.browser.tls.certresolver=letsencrypt"
      - "traefik.http.services.browser.loadbalancer.server.port=6901"
      - "traefik.http.services.browser.loadbalancer.server.scheme=https"
    networks:
      - tools

  headless-browser:
    image: lightpanda/browser:latest
    pull_policy: always
    container_name: headless-browser
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "9222"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.headless-browser.rule=Host(`headless-browser.${DOMAIN}`)"
      - "traefik.http.routers.headless-browser.entrypoints=websecure"
      - "traefik.http.routers.headless-browser.tls=true"
      - "traefik.http.routers.headless-browser.tls.certresolver=letsencrypt"
      - "traefik.http.services.headless-browser.loadbalancer.server.port=9222"
      - "traefik.http.services.headless-browser.loadbalancer.server.scheme=https"
    networks:
      - tools

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CRAWL4AI_API_TOKEN=${FIRECRAWL_API_KEY}
      - MAX_CONCURRENT_TASKS=5
    expose:
      - "11235"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crawl4ai.rule=Host(`crawl4ai.${DOMAIN}`)"
      - "traefik.http.routers.crawl4ai.entrypoints=websecure"
      - "traefik.http.routers.crawl4ai.tls=true"
      - "traefik.http.routers.crawl4ai.tls.certresolver=letsencrypt"
      - "traefik.http.services.crawl4ai.loadbalancer.server.port=11235"
    networks:
      - tools

networks:
  tools:
    name: tools
    driver: bridge
