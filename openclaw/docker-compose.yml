services:
  gateway:
    image: alpine/openclaw:latest
    pull_policy: always
    container_name: openclaw-gateway
    init: true
    env_file:
      - .env
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
      - TZ=UTC
    volumes:
      - ./openclaw.json:/home/node/.openclaw/openclaw.json
      - ./data/home:/home/node
      - ./opencode.json:/home/node/.config/opencode/opencode.json
      - /opt/workspace:/workspace
    ports:
      - "18789:18789"
      - "18790:18790"
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw-gateway.rule=Host(`gw.${DOMAIN}`)"
      - "traefik.http.routers.openclaw-gateway.entrypoints=websecure"
      - "traefik.http.routers.openclaw-gateway.tls=true"
      - "traefik.http.routers.openclaw-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.openclaw-gateway.loadbalancer.server.port=18789"
    networks:
      - openclaw
      - tools

networks:
  openclaw:
    name: openclaw
    driver: bridge
  tools:
    external: true
  traefik-proxy:
    external: true
